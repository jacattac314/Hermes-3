version: 1

system:
  name: hermes2-macos
  mode: local_first
  environment: development
  timezone: America/Chicago

paths:
  hermes_home: ~/.hermes
  log_dir: ~/.hermes/logs/hermes2
  report_dir: ~/.hermes/logs/hermes2/reports

runtime:
  local_base_url: http://127.0.0.1:1234/v1
  preferred_local_model: google/gemma-4-26b-a4b
  request_timeout_seconds: 300
  command_timeout_seconds: 300
  default_temperature: 0.2
  default_max_tokens: 512
  workspace_allowed_paths:
    - "~"

models:
  local_worker:
    provider: lmstudio
    model: auto
    base_url: http://127.0.0.1:1234/v1
    api_key_env: LMSTUDIO_API_KEY
    reasoning_effort: none

  openai_fallback:
    provider: openai
    model: gpt-5.4-mini
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  google_omni:
    provider: google
    model: gemini-2.5-flash
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY

  anthropic_reasoning:
    provider: anthropic
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY

model_chains:
  local_first:
    - local_worker
    - google_omni
    - openai_fallback
    - anthropic_reasoning

profiles:
  default:
    description: General local-first Hermes2 operator profile.
    model_chain: local_first
    workflows:
      - default_task
      - code_build

  code:
    description: Repo review and command-gated validation profile.
    model_chain: local_first
    workflows:
      - code_build

  research:
    description: Planning and research profile for structured reports.
    model_chain: local_first
    workflows:
      - default_task

approval_rules:
  always_require_approval:
    - git push
    - rm -rf
    - sudo
    - chmod -R
    - docker system prune
    - curl -X POST

tools:
  shell:
    enabled: true
    adapter: workflow_executor
    description: Runs explicit validation commands through command-gated workflows.
    risk_level: high
    actions:
      - run_command

  filesystem:
    enabled: true
    adapter: builtin
    description: Reads allowed workspace and observability metadata.
    risk_level: medium
    actions:
      - workspace_status

  browser:
    enabled: true
    adapter: external
    description: Browser automation adapter for local page inspection.
    risk_level: medium
    requires_adapter: true
    actions:
      - open_url
      - inspect_page

  computer_use:
    enabled: true
    adapter: mcp_stdio
    command: "/Users/jack/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient"
    args:
      - mcp
    cwd: "/Users/jack/.codex/computer-use"
    transport: pty
    description: Guarded local Mac UI automation through the Codex Computer Use MCP adapter.
    risk_level: high
    requires_adapter: false
    confirmation_policy: computer_use
    actions:
      - adapter_tools
      - get_app_state
      - click
      - type_text
      - press_key
      - scroll
      - drag

teams:
  enabled: true
  mode: outgoing_webhook
  endpoint: /teams/outgoing
  profile: default
  outgoing_secret_env: HERMES2_TEAMS_OUTGOING_SECRET
  allow_unsigned_dev_requests: false
  response_timeout_seconds: 4.5
  max_tokens: 96

mobile:
  enabled: true
  mode: pwa
  path: /mobile
  token_env: HERMES2_MOBILE_TOKEN
  require_token: false
  ntfy:
    enabled: false
    server: https://ntfy.sh
    topic_env: HERMES2_NTFY_TOPIC
    token_env: HERMES2_NTFY_TOKEN

observability:
  emit_jsonl: true
  emit_markdown_report: true
